<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intec | Patchnotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@500;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           ПЕРЕМЕННЫЕ ЦВЕТОВЫХ ТЕМ (ИНВЕРСИЯ)
        ============================================================ */
        :root {
            --c-bg: #000000;
            --c-bg-rgb: 0, 0, 0;
            --c-panel: #111111;
            --c-border: #1F1F1F;
            --c-text: #E7E7E7;
            --c-sub: #8C8C8C;
            --c-canvas: 231, 231, 231;
        }

        html[data-theme="light"] {
            --c-bg: #FFFFFF;
            --c-bg-rgb: 255, 255, 255;
            --c-panel: #F0F0F0;
            --c-border: #D4D4D4;
            --c-text: #1F1F1F;
            --c-sub: #666666;
            --c-canvas: 31, 31, 31;
        }

        /* МЕДЛЕННАЯ АНИМАЦИЯ */
        body, .top-bar, .sidebar, .main-area, .pn-card, .search-block, .v-track {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        
        /* БЫСТРАЯ АНИМАЦИЯ */
        .nav-btn, .back-btn, .toggle-btn, .pn-input, .pn-select, 
        .pn-card-title, .pn-card-desc, .tag, .pn-input-wrap, .pn-select-wrap::after {
            transition: background-color 0.1s ease, border-color 0.1s ease, color 0.1s ease;
        }
        svg { transition: stroke 0.1s ease, fill 0.1s ease; }

        /* ============================================================
           СИСТЕМА ЛОКАЛИЗАЦИИ
        ============================================================ */
        html[lang="en"] [data-lang="ru"] { display: none !important; }
        html[lang="ru"] [data-lang="en"] { display: none !important; }

        /* ============================================================
           СБРОС СТИЛЕЙ И БАЗА
        ============================================================ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100vh; height: 100dvh; 
            background: var(--c-bg); font-family: 'Noto Sans', sans-serif;
            overflow: hidden; user-select: none;
            display: flex; flex-direction: column; touch-action: none; 
        }

        /* ============================================================
           ВЕРХНЯЯ ПАНЕЛЬ И КНОПКИ
        ============================================================ */
        .top-bar { height: 75px; background: var(--c-panel); border-bottom: 3px solid var(--c-border); display: flex; align-items: center; padding: 18px; width: 100%; flex-shrink: 0; z-index: 10; }
        .back-btn { width: 36px; height: 36px; background: var(--c-border); border-radius: 9px; margin-right: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
        .back-btn svg { width: 18px; height: 18px; stroke: var(--c-text); fill: none; stroke-width: 1.5px; stroke-linecap: butt; stroke-linejoin: miter; }
        
        @media (hover: hover) { .back-btn:hover { border-color: var(--c-text); } }
        .back-btn:active { background: var(--c-text); } .back-btn:active svg { stroke: var(--c-panel); }
        
        .settings-group { display: flex; align-items: center; gap: 18px; margin-right: 39px; flex-shrink: 0; }
        .toggle-block { display: flex; gap: 3px; }
        .toggle-btn { width: 36px; height: 36px; background: var(--c-border); border: 2px solid transparent; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--c-text); }
        .toggle-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5px; stroke-linecap: round; stroke-linejoin: round; }
        .toggle-btn.text-btn { font-size: 14px; font-weight: 900; line-height: 1; }
        .toggle-block > *:first-child { border-top-left-radius: 9px; border-bottom-left-radius: 9px; }
        .toggle-block > *:last-child { border-top-right-radius: 9px; border-bottom-right-radius: 9px; }
        
        @media (hover: hover) { .toggle-btn:hover { border-color: var(--c-text); } }
        .toggle-btn.active, .toggle-btn:active { background: var(--c-text); color: var(--c-panel); border-color: var(--c-text); }
        .toggle-btn:active svg, .toggle-btn.active svg { stroke: var(--c-panel); }

        .breadcrumbs { flex-grow: 1; height: 36px; background: var(--c-border); border-radius: 9px; display: flex; align-items: center; padding: 0 9px; min-width: 0; }
        .bc-text { color: var(--c-text); font-size: 15px; font-weight: 500; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: normal; padding: 3px 0; }
        .bc-icon { width: 18px; height: 18px; margin: 0 6px; stroke: var(--c-text); fill: none; stroke-width: 1.5px; flex-shrink: 0; }

        /* ============================================================
           БОКОВАЯ ПАНЕЛЬ И КОНТЕНТ
        ============================================================ */
        .content-wrapper { display: flex; flex-grow: 1; width: 100%; overflow: hidden; }
        .sidebar { width: 300px; height: 100%; background: var(--c-panel); border-right: 3px solid var(--c-border); flex-shrink: 0; z-index: 5; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 18px; padding: 18px; }
        .nav-btn { width: 100%; height: 36px; background: var(--c-border); border-radius: 9px; display: flex; align-items: center; padding: 0 9px; cursor: pointer; border: 2px solid transparent; color: var(--c-text); text-decoration: none; }
        .nav-btn .nav-icon { width: 18px; height: 18px; margin-right: 9px; stroke: currentColor; fill: none; stroke-width: 1.5px; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .nav-btn span { font-size: 15px; font-weight: 500; white-space: nowrap; line-height: normal; padding: 3px 0; }
        
        @media (hover: hover) { .nav-btn:hover { border-color: var(--c-text); } }
        .nav-btn:active, .nav-btn.active { background: var(--c-text); color: var(--c-panel); }
        
        .main-area { flex-grow: 1; background: var(--c-bg); position: relative; overflow: hidden; touch-action: none; }

        /* ============================================================
           СИСТЕМА СКРОЛЛИНГА
        ============================================================ */
        .main-clip { position: absolute; inset: 0; overflow: hidden; z-index: 2; touch-action: none; }
        .main-panel { position: relative; width: 100%; min-height: 100%; display: flex; flex-direction: column; align-items: flex-start; will-change: transform; }
        .main-grad-bottom, .main-grad-top { position: absolute; left: 0; right: 0; height: 60px; pointer-events: none; opacity: 0; transition: opacity 0.25s; z-index: 10; }
        .main-grad-bottom { bottom: 0; background: linear-gradient(to bottom, rgba(var(--c-bg-rgb),0) 0%, rgba(var(--c-bg-rgb),1) 100%); }
        .main-grad-top { top: 0; background: linear-gradient(to bottom, rgba(var(--c-bg-rgb),1) 0%, rgba(var(--c-bg-rgb),0) 100%); }
        
        .v-slider-container { position: absolute; right: 18px; top: 18px; bottom: 18px; width: 3px; z-index: 25; display: flex; justify-content: center; }
        .v-track { width: 3px; height: 100%; background: var(--c-border); position: relative; border-radius: 1.5px; }
        .v-thumb { width: 3px; top: 0; left: 0; background: var(--c-text); position: absolute; cursor: grab; touch-action: none; border-radius: 1.5px; }
        .v-thumb:active { cursor: grabbing; }
        .v-thumb::after { content: ''; position: absolute; top: -10px; bottom: -10px; left: -20px; right: -20px; }

        /* ============================================================
           ИНТЕРФЕЙС ПАТЧНОУТОВ
        ============================================================ */
        .cards-layout { width: 100%; padding: 18px 30px 18px 18px; display: flex; flex-direction: column; gap: 18px; }
        .list-view { display: flex; flex-direction: column; gap: 18px; width: 100%; }

        .search-block { width: 100%; height: 78px; background: var(--c-panel); border: 3px solid var(--c-border); border-radius: 18px; padding: 0 18px; display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
        
        .pn-input-wrap { flex-grow: 1; height: 36px; position: relative; display: flex; align-items: center; color: var(--c-text); }
        
        /* Поле ввода поиска использует focus-within (так как это поле для текста) */
        .pn-input-wrap:focus-within, .pn-input-wrap.active-state { color: var(--c-panel); }
        
        .search-icon { position: absolute; left: 9px; width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2px; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; transition: stroke 0.1s ease; }
        
        .pn-input { width: 100%; height: 100%; display: block; margin: 0; background: var(--c-border); border: 2px solid transparent; border-radius: 9px; padding: 0 18px 0 36px; color: var(--c-text); font-size: 15px; font-weight: 500; font-family: 'Noto Sans', sans-serif; white-space: nowrap; line-height: normal; outline: none; transition: background-color 0.1s ease, border-color 0.1s ease, color 0.1s ease; }
        .pn-input::placeholder { color: var(--c-text); opacity: 1; transition: opacity 0.1s ease; }
        
        @media (hover: hover) { .pn-input:hover { border-color: var(--c-text); } }
        .pn-input-wrap:focus-within .pn-input, .pn-input-wrap.active-state .pn-input { background: var(--c-text); color: var(--c-panel); border-color: var(--c-text); }
        
        /* ИЗМЕНЕНИЯ: opacity: 0 скрывает плейсхолдер при фокусе или наличии текста */
        .pn-input-wrap:focus-within .pn-input::placeholder, .pn-input-wrap.active-state .pn-input::placeholder { opacity: 0; }

        .pn-select-wrap { width: 261px; height: 36px; position: relative; flex-shrink: 0; }
        .pn-select { width: 100%; height: 100%; display: block; margin: 0; background: var(--c-border); border: 2px solid transparent; border-radius: 9px; padding: 0 36px 0 18px; color: var(--c-text); font-size: 15px; font-weight: 500; font-family: 'Noto Sans', sans-serif; white-space: nowrap; line-height: normal; appearance: none; outline: none; cursor: pointer; transition: background-color 0.1s ease, border-color 0.1s ease, color 0.1s ease; }
        
        .pn-select-wrap::after { 
            content: ''; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; pointer-events: none;
            background-color: var(--c-text);
            -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><polyline points="6 9 12 15 18 9"></polyline></svg>') center/contain no-repeat;
            mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><polyline points="6 9 12 15 18 9"></polyline></svg>') center/contain no-repeat;
        }
        
        @media (hover: hover) { .pn-select:hover { border-color: var(--c-text); } }
        
        .pn-select-wrap:active .pn-select,
        .pn-select-wrap.active-state .pn-select { background: var(--c-text); color: var(--c-panel); border-color: var(--c-text); }
        
        .pn-select-wrap:active::after,
        .pn-select-wrap.active-state::after { background-color: var(--c-panel); }

        .pn-card { width: 100%; background: var(--c-panel); border: 3px solid var(--c-border); border-radius: 18px; padding: 18px; display: flex; flex-direction: column; gap: 18px; }

        .pn-card-title { color: var(--c-text); font-size: 42px; font-weight: 900; letter-spacing: 0.05em; line-height: 1.1; }
        .pn-card-desc { color: var(--c-sub); font-size: 21px; font-weight: 500; line-height: 1.6; text-align: justify; }
        .pn-card-desc .highlight { color: var(--c-text); } 
        
        .pn-card-desc a { color: #809571; text-decoration: none; font-weight: 900; transition: color 0.1s ease, filter 0.1s ease; position: relative; z-index: 5; pointer-events: auto; }
        .pn-card-desc a:hover { text-decoration: underline; filter: brightness(1.2); }

        /* ============================================================
           АДАПТИВ ДЛЯ МОБИЛЬНЫХ УСТРОЙСТВ
        ============================================================ */
        @media (max-width: 900px) {
            .top-bar { height: 37.5px; padding: 9px; border-bottom-width: 1.5px; } .back-btn { width: 18px; height: 18px; border-radius: 4.5px; margin-right: 9px; border-width: 1px; }
            .back-btn svg { width: 9px; height: 9px; stroke-width: 1px; } .settings-group { gap: 9px; margin-right: 19.5px; } .toggle-block { gap: 1.5px; }
            .toggle-btn { width: 18px; height: 18px; border-width: 1px; } .toggle-btn svg { width: 9px; height: 9px; stroke-width: 1px; } .toggle-btn.text-btn { font-size: 7px; }
            .toggle-block > *:first-child { border-top-left-radius: 4.5px; border-bottom-left-radius: 4.5px; } .toggle-block > *:last-child { border-top-right-radius: 4.5px; border-bottom-right-radius: 4.5px; }
            .breadcrumbs { height: 18px; border-radius: 4.5px; padding: 0 4.5px; } .bc-text { font-size: 7.5px; padding: 1px 0; } .bc-icon { width: 9px; height: 9px; margin: 0 3px; stroke-width: 1px; }
            .sidebar { width: 150px; border-right-width: 1.5px; } .sidebar-nav { gap: 9px; padding: 9px; } .nav-btn { height: 18px; border-radius: 4.5px; padding: 0 4.5px; border-width: 1px; }
            .nav-btn .nav-icon { width: 9px; height: 9px; margin-right: 4.5px; stroke-width: 1px; } .nav-btn span { font-size: 7.5px; padding: 1px 0; }
            
            .main-grad-bottom, .main-grad-top { height: 30px; }
            .v-slider-container { right: 4px; top: 9px; bottom: 9px; width: 3px; }
            .v-track { width: 1.5px; } .v-thumb { width: 1.5px; }
            
            .cards-layout { padding: 9px 15px 9px 9px; gap: 9px; }
            .list-view { gap: 9px; }
            
            .search-block { border-width: 1.5px; border-radius: 9px; padding: 0 9px; height: 39px; gap: 9px; }
            .pn-input-wrap { height: 18px; }
            .pn-select-wrap { height: 18px; width: 130px; }
            
            .search-icon { left: 4.5px; width: 9px; height: 9px; stroke-width: 1px; }
            .pn-input { border-width: 1px; border-radius: 4.5px; padding: 0 9px 0 18px; font-size: 7.5px; } 
            
            .pn-select { border-width: 1px; border-radius: 4.5px; padding: 0 18px 0 9px; font-size: 7.5px; } 
            .pn-select-wrap::after { right: 6px; width: 6px; height: 6px; }

            .pn-card { border-width: 1.5px; border-radius: 9px; padding: 9px; gap: 9px; } 
            .pn-card-title { font-size: 16px; margin-bottom: 0; line-height: 1.2; } 
            .pn-card-desc { font-size: 9px; } 
        }

        /* ТОЛЬКО ВЕРТИКАЛЬНАЯ ОРИЕНТАЦИЯ НА МОБИЛЬНЫХ */
        @media (max-width: 900px) and (orientation: portrait) {
            .back-btn { margin-right: 19.5px; } .settings-group { gap: 9px; margin-right: 9px; } .sidebar { width: auto; }
            .sidebar .nav-btn { width: 18px; padding: 0; justify-content: center; } .sidebar .nav-btn .nav-icon { margin-right: 0; } .sidebar .nav-btn span { display: none; }
            
            .search-block { height: auto; flex-direction: column; padding: 9px; }
            .pn-input-wrap, .pn-select-wrap { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="back-btn"><svg viewBox="0 0 18 18"><path d="M 9 3 L 3 9 L 9 15 M 15 3 L 9 9 L 15 15"/></svg></div>
        <div class="settings-group">
            <div class="toggle-block theme-group">
                <div class="toggle-btn" data-theme-val="system"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                <div class="toggle-btn" data-theme-val="dark"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></div>
                <div class="toggle-btn" data-theme-val="light"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></div>
            </div>
            <div class="toggle-block lang-group">
                <div class="toggle-btn text-btn" data-lang-val="en">EN</div>
                <div class="toggle-btn text-btn" data-lang-val="ru">RU</div>
            </div>
        </div>
        <div class="breadcrumbs">
            <span class="bc-text">Intec</span>
            <svg class="bc-icon" viewBox="0 0 18 18"><path d="M 6 3 L 12 9 L 6 15"/></svg>
            <span class="bc-text" data-lang="en">Patchnotes</span>
            <span class="bc-text" data-lang="ru">Патчноуты</span>
        </div>
    </header>

    <div class="content-wrapper">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <div class="nav-btn"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="4"/><path d="M6 12h4M8 10v4M15 11h.01M18 13h.01"/></svg><span>Race Legends</span></div>
                <div class="nav-btn"><svg class="nav-icon" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg><span>Fractal Forge</span></div>
                <div class="nav-btn"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><polygon points="10 9 15 12 10 15 10 9"/></svg><span>#RaceLegendsTV</span></div>
                <div class="nav-btn active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg><span data-lang="en">Patchnotes</span><span data-lang="ru">Патчноуты</span></div>
                <div class="nav-btn"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span data-lang="en">Chronograph</span><span data-lang="ru">Хронограф</span></div>
            </div>
        </aside>

        <main class="main-area">
            <div class="main-clip" id="mainClip">
                <div class="main-panel" id="mainPanel">
                    <div class="cards-layout">
                        
                        <div id="listView" class="list-view">
                            <div class="search-block">
                                <form class="pn-input-wrap" id="searchForm" action="javascript:void(0);">
                                    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                    <input type="text" id="searchInput" class="pn-input" placeholder="Search" enterkeyhint="search">
                                </form>
                                <div class="pn-select-wrap">
                                    <select id="filterSelect" class="pn-select">
                                        <option value="all">All categories / Все</option>
                                        <option value="rl">Race Legends</option>
                                        <option value="ff">Fractal Forge</option>
                                        <option value="dev">Devlog / Дневники</option>
                                        <option value="chrono">Chronograph / Хронограф</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div id="patchnotesContainer" style="display: flex; flex-direction: column; gap: inherit;"></div>
                        </div>

                    </div>
                </div>
                <div class="main-grad-bottom" id="mainGradBottom"></div>
                <div class="main-grad-top" id="mainGradTop"></div>
            </div>
            <div class="v-slider-container">
                <div class="v-track" id="vTrack"><div class="v-thumb" id="vThumb"></div></div>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        //  СИСТЕМА ЗВУКОВ: ПРИРОДНЫЙ LO-FI (БЕЗ ПИСКОВ И ОБРЫВОВ)
        // ============================================================
        let sharedAudioCtx = null;
        let audioUnlocked = false;
        let inputWasFocused = false; 

        function playTone(type, startFreq, endFreq, maxVol, duration, attackTime = 0.003) {
            try {
                if (!sharedAudioCtx) {
                    sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                if (sharedAudioCtx.state === 'suspended') {
                    sharedAudioCtx.resume().catch(() => { });
                    if (sharedAudioCtx.state === 'suspended') return;
                }

                const osc = sharedAudioCtx.createOscillator();
                const gainNode = sharedAudioCtx.createGain();

                osc.type = type;

                const now = sharedAudioCtx.currentTime;

                osc.frequency.setValueAtTime(startFreq, now);
                osc.frequency.exponentialRampToValueAtTime(endFreq, now + duration);

                gainNode.gain.setValueAtTime(0, now); 
                gainNode.gain.linearRampToValueAtTime(maxVol, now + attackTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                gainNode.gain.linearRampToValueAtTime(0, now + duration + 0.01);

                osc.connect(gainNode);
                gainNode.connect(sharedAudioCtx.destination);

                osc.start(now);
                osc.stop(now + duration + 0.02);
            } catch (e) { }
        }

        let lastHoverTime = 0;

        function playUIHover(e) {
            if (e && e.pointerType !== 'mouse') return;

            const tgt = e.currentTarget;
            if (tgt) {
                // Если это кнопка меню или переключатель темы и она уже активна
                if (tgt.classList.contains('active')) return;
                
                // Если это поиск или фильтр
                if (tgt.classList.contains('pn-input') || tgt.classList.contains('pn-select')) {
                    // Если есть класс active-state у обертки (т.е. объект уже белый), звук выделения не играем
                    if (tgt.closest('.active-state')) return;
                    
                    // Если элемент просто в фокусе
                    if (tgt === document.activeElement) return;
                }
            }

            const now = Date.now();
            if (now - lastHoverTime < 40) return;
            lastHoverTime = now;

            playTone('sine', 180, 250, 0.35, 0.04, 0.005);
        }

        function playUIClick(e) {
            const tgt = e.currentTarget;
            if (tgt) {
                if (tgt.classList.contains('active')) return;
                if ((tgt.classList.contains('pn-input') || tgt.classList.contains('pn-select')) && inputWasFocused) return;
            }

            playTone('sine', 190, 150, 0.6, 0.05, 0.0025);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.pn-input, .pn-select');
            inputs.forEach(el => {
                el.addEventListener('pointerdown', () => {
                    inputWasFocused = document.activeElement === el;
                });
            });

            const clickableElements = document.querySelectorAll('.back-btn, .toggle-btn, .nav-btn, .pn-select, .pn-input');
            clickableElements.forEach(btn => {
                btn.addEventListener('pointerenter', playUIHover);
                btn.addEventListener('click', playUIClick, true);
            });

            const unlockAudio = () => {
                if (audioUnlocked) return;
                if (!sharedAudioCtx) sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (sharedAudioCtx.state === 'suspended') {
                    sharedAudioCtx.resume().then(() => { audioUnlocked = true; }).catch(() => { });
                } else {
                    audioUnlocked = true;
                }

                if (audioUnlocked) {
                    ['click', 'pointerdown', 'touchstart', 'keydown'].forEach(evt => {
                        document.removeEventListener(evt, unlockAudio);
                    });
                }
            };

            ['click', 'pointerdown', 'touchstart', 'keydown'].forEach(evt => {
                document.addEventListener(evt, unlockAudio, { passive: true });
            });
        });

        const rootTheme = document.documentElement;
        let currentLang = 'en';

        const listContainer = document.getElementById('patchnotesContainer');
        const searchInput = document.getElementById('searchInput');
        const searchForm = document.getElementById('searchForm');
        const filterSelect = document.getElementById('filterSelect');
        const mainClip = document.getElementById('mainClip');
        const mainPanel = document.getElementById('mainPanel');
        const vTrack = document.getElementById('vTrack');
        const vThumb = document.getElementById('vThumb');
        const mainGradBottom = document.getElementById('mainGradBottom');
        const mainGradTop = document.getElementById('mainGradTop');

        let panelOffset = 0;

        // ============================================================
        //  ЛОГИКА СКРОЛЛА
        // ============================================================
        function getPanelMaxOffset() { return Math.max(0, mainPanel.scrollHeight - mainClip.clientHeight); }

        function setPanelOffset(o) {
            const max = getPanelMaxOffset(); 
            panelOffset = Math.max(0, Math.min(o, max));
            mainPanel.style.transform = `translateY(-${panelOffset}px)`;
            mainGradBottom.style.opacity = (panelOffset < max) && (max > 0) ? '1' : '0';
            mainGradTop.style.opacity = panelOffset > 0 ? '1' : '0'; 
            
            if (max <= 0) { 
                vThumb.style.height = '100%'; 
                vThumb.style.top = '0px'; 
            } else {
                const th = Math.max((mainClip.clientHeight / mainPanel.scrollHeight) * vTrack.clientHeight, 40);
                vThumb.style.height = `${th}px`;
                vThumb.style.top = `${(panelOffset / max) * (vTrack.clientHeight - th)}px`;
            }
        }

        const resizeObserver = new ResizeObserver(() => {
            const max = getPanelMaxOffset();
            if (panelOffset > max) panelOffset = max;
            setPanelOffset(panelOffset); 
        });
        resizeObserver.observe(mainPanel);

        mainClip.addEventListener('wheel', e => { e.preventDefault(); setPanelOffset(panelOffset + e.deltaY); }, { passive: false });
        window.addEventListener('resize', () => setPanelOffset(panelOffset));

        window.addEventListener('keydown', e => {
            if (['INPUT', 'TEXTAREA', 'BUTTON', 'SELECT'].includes(document.activeElement.tagName)) return;
            const step = 60; const pageStep = mainClip.clientHeight * 0.8;
            let newOffset = panelOffset; let handled = false;
            switch(e.key) {
                case 'ArrowUp': newOffset -= step; handled = true; break;
                case 'ArrowDown': newOffset += step; handled = true; break;
                case 'PageUp': newOffset -= pageStep; handled = true; break;
                case 'PageDown': newOffset += pageStep; handled = true; break;
                case ' ': newOffset += e.shiftKey ? -pageStep : pageStep; handled = true; break;
                case 'Home': newOffset = 0; handled = true; break;
                case 'End': newOffset = getPanelMaxOffset(); handled = true; break;
            }
            if (handled) { e.preventDefault(); setPanelOffset(newOffset); }
        });

        let activeDrag = false, startY, startPanelOffset;
        vThumb.addEventListener('pointerdown', e => { 
            activeDrag = true; startY = e.pageY; startPanelOffset = panelOffset; 
            vThumb.setPointerCapture(e.pointerId); e.stopPropagation(); 
        });
        vThumb.addEventListener('pointermove', e => {
            if (activeDrag) { 
                e.preventDefault(); 
                const trackSpace = vTrack.clientHeight - vThumb.offsetHeight;
                if (trackSpace > 0) setPanelOffset(startPanelOffset + ((e.pageY - startY) / trackSpace) * getPanelMaxOffset());
            }
        });
        vThumb.addEventListener('pointerup', e => { activeDrag = false; try { vThumb.releasePointerCapture(e.pointerId); } catch(err) {} });
        vThumb.addEventListener('pointercancel', e => { activeDrag = false; try { vThumb.releasePointerCapture(e.pointerId); } catch(err) {} });

        let touchStartY = 0, touchStartOffset = 0, touchVelocity = 0, lastTouchY = 0, lastTouchTime = 0, inertiaFrame;

        mainClip.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) return; cancelAnimationFrame(inertiaFrame);
            touchStartY = e.touches[0].clientY; lastTouchY = touchStartY;
            lastTouchTime = Date.now(); touchStartOffset = panelOffset;
        }, { passive: false }); 

        mainClip.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) return; e.preventDefault(); 
            const touchY = e.touches[0].clientY; const now = Date.now();
            touchVelocity = (touchY - lastTouchY) / (now - lastTouchTime || 1);
            lastTouchY = touchY; lastTouchTime = now;
            setPanelOffset(touchStartOffset + (touchStartY - touchY));
        }, { passive: false });

        mainClip.addEventListener('touchend', () => {
            let v = touchVelocity * 15; 
            const step = () => {
                if (Math.abs(v) < 0.5) return; 
                let prevOffset = panelOffset; setPanelOffset(panelOffset - v);
                if (panelOffset === prevOffset) { v = 0; return; }
                v *= 0.92; inertiaFrame = requestAnimationFrame(step);
            };
            step();
        });

        // ============================================================
        //  ФУНКЦИИ РЕНДЕРА И КОНТРОЛЬ ФОКУСА ПОИСКА/ФИЛЬТРОВ
        // ============================================================
        function updateInputStates() {
            if (searchInput.value.trim().length > 0) searchForm.classList.add('active-state');
            else searchForm.classList.remove('active-state');

            const selectWrap = document.querySelector('.pn-select-wrap');
            if (filterSelect.value !== 'all') selectWrap.classList.add('active-state');
            else selectWrap.classList.remove('active-state');
        }

        let enterPressedTime = 0;

        filterSelect.addEventListener('focus', () => {
            // Предотвращаем случайный фокус после нажатия Enter в поле поиска
            if (Date.now() - enterPressedTime < 200) {
                filterSelect.blur();
            }
        });

        // Защита от скрытого залипания системного фокуса на элементе
        document.addEventListener('pointerup', (e) => {
            if (document.activeElement === filterSelect && !e.target.closest('.pn-select-wrap')) {
                filterSelect.blur();
            }
        });

        filterSelect.addEventListener('change', () => { 
            filterSelect.blur(); // Сбрасываем системный фокус при выборе
            updateInputStates(); 
            renderList(); 
        });

        searchInput.addEventListener('input', () => { updateInputStates(); renderList(); });
        
        searchInput.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') {
                e.preventDefault(); 
                enterPressedTime = Date.now();
                searchInput.blur(); 
            }
        });

        searchForm.addEventListener('submit', (e) => { 
            e.preventDefault(); 
            enterPressedTime = Date.now();
            searchInput.blur(); 
        });

        function renderList() {
            listContainer.innerHTML = '';
            
            const card = document.createElement('div');
            card.className = 'pn-card';
            card.style.cursor = 'default';

            card.innerHTML = `
                <div class="pn-card-title" data-lang="en">Work in Progress</div>
                <div class="pn-card-title" data-lang="ru">В разработке</div>
                <div class="pn-card-desc">
                    <!-- EN VERSION -->
                    <div data-lang="en">
                        The patchnotes section is still under development. Until I finish it, you can read all the update logs on my page at the <a href='https://clovi.ru/posts' target='_blank'>clovi.ru/posts</a> platform (just search for "Race Legends").<br><br>
                        <span class="highlight">A quick note on donations:</span><br>
                        If you want to support the game's development financially — I am deeply grateful for your intention. However, I don't need monetary support right now. What I desperately need is more free time, and sadly, that cannot be gifted.<br><br>
                        But if you really want to do a good deed, please support the creator of the <span class="highlight">Clovi</span> platform (Kel Caffeine). This independent service is currently going through tough times: they simply don't have enough funds to pay for their hosting servers. Your contribution will save their project from shutting down and keep a great place for my patchnotes alive.<br><br>
                        You can support Clovi here: <a href='https://dalink.to/kel_cu' target='_blank'>Tips</a>, <a href='https://boosty.to/simply_kel' target='_blank'>Boosty</a>, or directly via Telegram <a href='https://t.me/Kel_Caffeine' target='_blank'>@Kel_Caffeine</a>.
                    </div>
                    
                    <!-- RU VERSION -->
                    <div data-lang="ru">
                        Раздел патчноутов всё ещё находится в разработке. Пока я не закончу, вы можете читать все списки изменений в моем профиле на платформе <a href='https://clovi.ru/posts' target='_blank'>clovi.ru/posts</a> (просто введите в поиске «Race Legends»).<br><br>
                        <span class="highlight">Пару слов о поддержке:</span><br>
                        Если вы хотите поддержать разработку игры финансово — я безмерно вам благодарен. Однако на данный момент в финансовой поддержке нет необходимости. Сейчас мне катастрофически не хватает свободного времени, а его, увы, не подаришь.<br><br>
                        Но если вам очень хочется сделать доброе дело, пожалуйста, поддержите создателя платформы <span class="highlight">Clovi</span> (Кел Кофеин). Сейчас этот независимый сервис переживает тяжелые времена: ребятам банально не хватает средств на оплату серверов хостинга. Ваша помощь спасет их проект от закрытия, а мне сохранит удобную площадку для публикации патчноутов.<br><br>
                        Поддержать проект Clovi можно тут: <a href='https://dalink.to/kel_cu' target='_blank'>Чаевые</a>, <a href='https://boosty.to/simply_kel' target='_blank'>Boosty</a> или напрямую в Telegram <a href='https://t.me/Kel_Caffeine' target='_blank'>@Kel_Caffeine</a>.
                    </div>
                </div>
            `;
            
            listContainer.appendChild(card);
            
            setTimeout(() => setPanelOffset(panelOffset), 50);
        }

        // ============================================================
        //  ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ТЕМ И ЯЗЫКА
        // ============================================================
        const themeBtns = document.querySelectorAll('.theme-group .toggle-btn');
        const sysMedia = window.matchMedia('(prefers-color-scheme: light)');

        function applyTheme(themeVal) {
            let isLight = themeVal === 'system' ? sysMedia.matches : themeVal === 'light';
            if (isLight) rootTheme.setAttribute('data-theme', 'light'); else rootTheme.removeAttribute('data-theme');
            try { localStorage.setItem('rl-theme', themeVal); } catch(e) {}
            
            themeBtns.forEach(btn => {
                if (btn.getAttribute('data-theme-val') === themeVal) btn.classList.add('active'); 
                else btn.classList.remove('active');
            });
        }

        themeBtns.forEach(btn => btn.addEventListener('click', () => applyTheme(btn.getAttribute('data-theme-val'))));
        sysMedia.addEventListener('change', () => {
            let current = 'system';
            try { current = localStorage.getItem('rl-theme') || 'system'; } catch(e) {}
            if (current === 'system') applyTheme('system');
        });

        const langBtns = document.querySelectorAll('.lang-group .toggle-btn');
        
        function applyLang(langVal) {
            currentLang = langVal;
            rootTheme.setAttribute('lang', langVal);
            try { localStorage.setItem('rl-lang', langVal); } catch(e) {}
            
            langBtns.forEach(btn => {
                if (btn.getAttribute('data-lang-val') === langVal) btn.classList.add('active'); 
                else btn.classList.remove('active');
            });

            document.getElementById('searchInput').placeholder = currentLang === 'en' ? "Search" : "Поиск";
            
            renderList(); 
        }

        langBtns.forEach(btn => btn.addEventListener('click', () => applyLang(btn.getAttribute('data-lang-val'))));

        let savedTheme = 'system';
        try { savedTheme = localStorage.getItem('rl-theme') || 'system'; } catch(e) {}
        applyTheme(savedTheme);

        let savedLang = 'en';
        try { savedLang = localStorage.getItem('rl-lang') || 'en'; } catch(e) {}
        applyLang(savedLang);

    </script>
</body>
</html>

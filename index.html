<script>
        // ============================================================
        //  ТЕМЫ
        // ============================================================
        const rootTheme = document.documentElement;
        let currentCanvasColor = '180, 190, 205'; 
        const themeBtns = document.querySelectorAll('.theme-group .toggle-btn');
        const sysMedia = window.matchMedia('(prefers-color-scheme: light)');

        function applyTheme(themeVal) {
            let isLight = themeVal === 'system' ? sysMedia.matches : themeVal === 'light';
            if (isLight) rootTheme.setAttribute('data-theme', 'light'); else rootTheme.removeAttribute('data-theme');
            try { localStorage.setItem('rl-theme', themeVal); } catch(e) {}
            
            themeBtns.forEach(btn => {
                if (btn.getAttribute('data-theme-val') === themeVal) btn.classList.add('active'); 
                else btn.classList.remove('active');
            });
            setTimeout(() => { currentCanvasColor = getComputedStyle(rootTheme).getPropertyValue('--c-canvas').trim(); }, 50);
        }

        themeBtns.forEach(btn => btn.addEventListener('click', () => applyTheme(btn.getAttribute('data-theme-val'))));
        sysMedia.addEventListener('change', () => {
            let current = 'system';
            try { current = localStorage.getItem('rl-theme') || 'system'; } catch(e) {}
            if (current === 'system') applyTheme('system');
        });

        let savedTheme = 'system';
        try { savedTheme = localStorage.getItem('rl-theme') || 'system'; } catch(e) {}
        applyTheme(savedTheme);

        // ============================================================
        // ИНТЕРАКТИВНЫЙ КАНВАС
        // ============================================================
        const canvas = document.getElementById('intro-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const spacing = 24; 
        
        let cols = 0, rows = 0;
        let mouseX = -1000, mouseY = -1000;
        let isEntering = false;

        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            
            cols = Math.ceil(width / spacing) + 1;
            rows = Math.ceil(height / spacing) + 1;
        }

        window.addEventListener('resize', initCanvas);
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mouseout', () => { mouseX = -1000; mouseY = -1000; });

        initCanvas();

        function drawGrid() {
            ctx.clearRect(0, 0, width, height);
            
            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    let x = c * spacing + (width % spacing) / 2;
                    let y = r * spacing + (height % spacing) / 2;
                    
                    let dx = mouseX - x;
                    let dy = mouseY - y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    let mouseInfluence = Math.max(0, 1 - dist / 200); 
                    let intensity = mouseInfluence * mouseInfluence * (3 - 2 * mouseInfluence);
                    
                    let radius = 0.8 + intensity * 3.2; 
                    let alpha = 0.05 + intensity * 0.95; 

                    ctx.fillStyle = `rgba(${currentCanvasColor}, ${alpha})`;
                    ctx.beginPath(); 
                    ctx.arc(x, y, radius, 0, Math.PI * 2); 
                    ctx.fill();
                }
            }
            
            if (!isEntering) {
                requestAnimationFrame(drawGrid);
            }
        }
        drawGrid();

        // ============================================================
        // ЛОГИКА ВХОДА И МАРШРУТИЗАЦИЯ (SEO)
        // ============================================================
        const gateBtns = document.querySelectorAll('.gate-btn');

        gateBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isEntering) return;
                isEntering = true;
                
                btn.classList.add('entering');
                
                const lang = btn.getAttribute('data-lang-entry');
                try { localStorage.setItem('rl-lang', lang); } catch(e) {}

                document.body.classList.add('transitioning');

                setTimeout(() => {
                    // Разделяем языки
                    if (lang === 'ru') {
                        window.location.href = 'ru/rl.html'; // Русская версия (пока выдаст 404, сделаем папку позже)
                    } else {
                        window.location.href = 'rl.html';    // Английская версия (маленькими буквами, сработает сразу!)
                    }
                }, 800);
            });
        });
    </script>
